name: Release

on:
  push:
    tags:
      - "v*"

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4

      - name: Set up JDK 17
        uses: actions/setup-java@c5195efecf7bdfc987ee8bae7a71cb8b11521c00 # v4
        with:
          distribution: temurin
          java-version: 17

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@af1da67850ed9a4cedd57bfd976089dd991e2582 # v4

      - name: Build
        run: ./gradlew build --no-daemon --warning-mode=all

      - name: Validate plugins
        run: ./gradlew validatePlugins --no-daemon

      - name: Upload plugin JAR
        uses: actions/upload-artifact@ea165f8d65b6db9a6b7e75b195db0cb23deacb33 # v4
        with:
          name: plugin-jar
          path: build/libs/*.jar
          retention-days: 90

      - name: Upload test reports
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6db9a6b7e75b195db0cb23deacb33 # v4
        with:
          name: test-reports
          path: |
            build/reports/tests/
            build/reports/codenarc/
          retention-days: 30

      - name: Create reports archive
        if: success()
        run: |
          VERSION="${GITHUB_REF_NAME}"
          tar -czf gradle-pitest-plugin-${VERSION}-reports.tar.gz \
            build/reports/tests/ \
            build/reports/codenarc/ \
            2>/dev/null || true

      - name: Upload reports archive
        if: success()
        uses: actions/upload-artifact@ea165f8d65b6db9a6b7e75b195db0cb23deacb33 # v4
        with:
          name: release-reports
          path: gradle-pitest-plugin-*-reports.tar.gz
          retention-days: 90

  release:
    runs-on: ubuntu-latest
    needs: build-and-test
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4
        with:
          fetch-depth: 0

      - name: Download plugin JAR
        uses: actions/download-artifact@fa0a91b85d4f404e444e00e005971372dc801d16 # v4
        with:
          name: plugin-jar
          path: artifacts/

      - name: Download reports archive
        uses: actions/download-artifact@fa0a91b85d4f404e444e00e005971372dc801d16 # v4
        with:
          name: release-reports

      - name: Extract release notes from CHANGES.md
        run: |
          VERSION="${GITHUB_REF_NAME#v}"

          # Extract the section between two version headers.
          # From "## [X.Y.Z]" until next "## [" or end of file.
          awk -v ver="$VERSION" '
            /^## \[/ {
              if (found) exit
              if ($0 ~ "\\[" ver "\\]") found=1
              next
            }
            /^\[.+\]:/ && found { exit }
            found { print }
          ' CHANGES.md > release-notes.md

          # Fallback if no section found for this version.
          if [ ! -s release-notes.md ]; then
            echo "No release notes found for version $VERSION in CHANGES.md."
            {
              echo "## What's Changed"
              echo ""
              echo "See [CHANGES.md](https://github.com/${{ github.repository }}/blob/master/CHANGES.md) for details."
            } > release-notes.md
          fi

          echo "--- Release notes for $VERSION ---"
          cat release-notes.md

      - name: Create GitHub Release
        run: |
          gh release create "$GITHUB_REF_NAME" \
            --title "gradle-pitest-plugin ${GITHUB_REF_NAME}" \
            --notes-file release-notes.md \
            artifacts/*.jar \
            gradle-pitest-plugin-*-reports.tar.gz
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
